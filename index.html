const ALL_CATEGORIES = ["すべて", ...Object.keys(CATEGORY_ICONS)];
const chainMap = Object.fromEntries(CHAINS.map(c => [c.id, c]));

function ProductImage({ img, chain, name }) {
  const [err, setErr] = useState(false);
  if (img && !err) {
    return (
      <div style={{height:160, overflow:"hidden", background:"#f9f9f9", display:"flex", alignItems:"center", justifyContent:"center"}}>
        <img
          src={img} alt={name}
          onError={() => setErr(true)}
          style={{width:"100%", height:"100%", objectFit:"cover", objectPosition:"center"}}
        />
      </div>
    );
  }
  return (
    <div style={{
      height:160, background:chain.grad,
      display:"flex", flexDirection:"column",
      alignItems:"center", justifyContent:"center", gap:6
    }}>
      <span style={{fontSize:44}}>{chain.emoji}</span>
      <span style={{color:"rgba(255,255,255,0.85)", fontSize:13, fontWeight:"bold"}}>{chain.name}</span>
    </div>
  );
}

function StoresPage({ chainOrder }) {
  return (
    <div style={{padding:"16px"}}>
      {CHAIN_GROUPS.map(group => {
        const groupChains = chainOrder
          .filter(id => group.ids.includes(id))
          .map(id => chainMap[id]);
        group.ids.forEach(id => { if (!groupChains.find(c => c.id === id)) groupChains.push(chainMap[id]); });
        return (
          <div key={group.label} style={{marginBottom:24}}>
            {/* グループヘッダー */}
            <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:12}}>
              <div style={{height:2, flex:1, background:`linear-gradient(90deg,${group.color},transparent)`, borderRadius:1}} />
              <span style={{fontSize:14, fontWeight:"bold", color:group.color, background:group.bg,
                padding:"3px 14px", borderRadius:20, border:`1.5px solid ${group.color}30`}}>
                {group.label}
              </span>
              <div style={{height:2, flex:1, background:`linear-gradient(270deg,${group.color},transparent)`, borderRadius:1}} />
            </div>
            <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))", gap:12}}>
              {groupChains.map(chain => {
          const count = PRODUCTS.filter(p => p.chainId === chain.id).length;
          return (
            <a key={chain.id} href={chain.url} target="_blank" rel="noopener noreferrer"
              style={{textDecoration:"none"}}>
              <div className="card" style={{
                background:"white", borderRadius:14, overflow:"hidden",
                boxShadow:"0 2px 8px rgba(0,0,0,0.07)",
                border:`1.5px solid ${chain.bg}`,
                transition:"transform .15s, box-shadow .15s", cursor:"pointer"
              }}>
                {/* Gradient accent bar */}
                <div style={{height:6, background:chain.grad}} />
                {/* Logo area */}
                <div style={{
                  padding:"20px 16px 12px",
                  display:"flex", flexDirection:"column", alignItems:"center", gap:10
                }}>
                  <div style={{
                    height:64, width:"100%", display:"flex",
                    alignItems:"center", justifyContent:"center"
                  }}>
                    <img
                      src={chain.logo} alt={chain.name}
                      style={{maxHeight:64, maxWidth:"80%", objectFit:"contain"}}
                      onError={e => { e.target.style.display="none"; e.target.nextSibling.style.display="flex"; }}
                    />
                    <div style={{display:"none", fontSize:36, alignItems:"center", justifyContent:"center"}}>{chain.emoji}</div>
                  </div>
                  <div style={{fontSize:14, color:"#64748B"}}>期間限定 <strong style={{color:chain.color}}>{PRODUCTS.filter(p=>p.chainId===chain.id).length}品</strong> 掲載中</div>
                </div>
                <div style={{padding:"10px 16px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", borderTop:`1px solid ${chain.bg}`}}>
                  <span style={{fontSize:14, color:chain.color, fontWeight:"bold"}}>公式メニューを見る</span>
                  <span style={{fontSize:14, color:chain.color}}>→</span>
                </div>
              </div>
            </a>
          );
        })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function App() {
  const [selectedChains, setSelectedChains] = useState(
    Object.fromEntries(CHAINS.map(c => [c.id, true]))
  );
  const [selectedCategory, setSelectedCategory] = useState("すべて");
  const [chainOrder, setChainOrder] = useState(CHAINS.map(c => c.id));
  const [view, setView] = useState("menu"); // "menu" | "stores"
  const [dragOver, setDragOver] = useState(null);
  const dragItem = useRef(null);

  const toggleChain = (id) => setSelectedChains(prev => ({ ...prev, [id]: !prev[id] }));

  const scrollToChain = (id) => {
    // チェーンが非表示の場合は表示してからスクロール
    if (!selectedChains[id]) {
      setSelectedChains(prev => ({ ...prev, [id]: true }));
      setTimeout(() => {
        const el = document.getElementById(`chain-section-${id}`);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 50);
    } else {
      const el = document.getElementById(`chain-section-${id}`);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  };

  const handleDragStart = (id) => { dragItem.current = id; };
  const handleDragOver = (e, id) => { e.preventDefault(); setDragOver(id); };
  const handleDrop = (targetId) => {
    if (!dragItem.current || dragItem.current === targetId) { setDragOver(null); return; }
    setChainOrder(prev => {
      const arr = [...prev];
      const from = arr.indexOf(dragItem.current);
      const to   = arr.indexOf(targetId);
      arr.splice(from, 1);
      arr.splice(to, 0, dragItem.current);
      return arr;
    });
    dragItem.current = null;
    setDragOver(null);
  };
  const handleDragEnd = () => { dragItem.current = null; setDragOver(null); };

  const orderedChains = chainOrder.map(id => chainMap[id]);

  const filtered = useMemo(() => {
    // グループ行順 → グループ内のchainOrder順 でインデックスを構築
    const displayOrder = {};
    let idx = 0;
    CHAIN_GROUPS.forEach(group => {
      const ordered = chainOrder.filter(id => group.ids.includes(id));
      group.ids.forEach(id => { if (!ordered.includes(id)) ordered.push(id); });
      ordered.forEach(id => { displayOrder[id] = idx++; });
    });
    return PRODUCTS
      .filter(p => {
        const chainOk = selectedChains[p.chainId];
        const catOk   = selectedCategory === "すべて" || p.category === selectedCategory;
        return chainOk && catOk;
      })
      .sort((a, b) => displayOrder[a.chainId] - displayOrder[b.chainId]);
  }, [selectedChains, selectedCategory, chainOrder]);

  return (
    <div style={{background:"#F7F8FA", minHeight:"100vh"}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1a1a2e,#0f3460)", color:"white", padding:"24px 20px 20px", textAlign:"center"}}>
        <div style={{fontSize:26, fontWeight:"bold"}}>🍽️ 期間限定メニュー</div>
        <div style={{display:"flex", gap:8, justifyContent:"center", marginTop:14}}>
          {[{id:"menu", label:"🍽️ メニュー"}, {id:"stores", label:"🏪 全店舗"}].map(tab => (
            <button key={tab.id} onClick={() => setView(tab.id)}
              style={{padding:"6px 18px", borderRadius:20, border:"none", cursor:"pointer", fontSize:13, fontWeight:"bold",
                background: view === tab.id ? "white" : "rgba(255,255,255,0.15)",
                color: view === tab.id ? "#1a1a2e" : "white",
                transition:"all .15s"}}>
              {tab.label}
            </button>
          ))}
        </div>
      </div>

      {view === "stores" ? (
        <StoresPage chainOrder={chainOrder} />
      ) : (
        <>
          {/* Sticky filters */}
          <div style={{background:"white", padding:"14px 16px", boxShadow:"0 2px 8px rgba(0,0,0,0.08)", position:"sticky", top:0, zIndex:10}}>
            <div style={{marginBottom:10}}>
              {CHAIN_GROUPS.map(group => {
                // group内のチェーンをchainOrderに従って並べる
                const groupChains = chainOrder
                  .filter(id => group.ids.includes(id))
                  .map(id => chainMap[id]);
                // chainOrderにないIDも一応フォールバック
                group.ids.forEach(id => {
                  if (!groupChains.find(c => c.id === id)) groupChains.push(chainMap[id]);
                });
                return (
                  <div key={group.label} style={{marginBottom:8}}>
                    <div style={{fontSize:14, color:"#94A3B8", fontWeight:"bold", marginBottom:5, letterSpacing:".5px"}}>
                      {group.label}
                    </div>
                    <div style={{display:"flex", gap:6, flexWrap:"wrap"}}>
                      {groupChains.map(chain => {
                        const active = selectedChains[chain.id];
                        const isDragTarget = dragOver === chain.id;
                        return (
                          <button key={chain.id}
                            draggable
                            onDragStart={() => handleDragStart(chain.id)}
                            onDragOver={e => handleDragOver(e, chain.id)}
                            onDrop={() => handleDrop(chain.id)}
                            onDragEnd={handleDragEnd}
                            onClick={() => scrollToChain(chain.id)}
                            className="chain-btn"
                            style={{display:"flex", alignItems:"center", gap:4, padding:"5px 11px", borderRadius:16,
                              border:`2px solid ${isDragTarget ? "#6366F1" : group.color}`,
                              background: isDragTarget ? "#EEF2FF" : group.bg,
                              color: group.color,
                              fontWeight:"bold", fontSize:14, cursor:"pointer",
                              transition:"all .15s",
                              opacity: dragItem.current === chain.id ? 0.5 : 1}}>
                            {chain.name}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex", gap:5, flexWrap:"wrap"}}>
              {ALL_CATEGORIES.map(cat => {
                const active = selectedCategory === cat;
                return (
                  <button key={cat} onClick={() => setSelectedCategory(cat)} className="cat-btn"
                    style={{padding:"4px 10px", borderRadius:14, border:"none",
                      background: active ? "#1a1a2e" : "#EDF2F7",
                      color: active ? "white" : "#4A5568",
                      fontSize:13, cursor:"pointer", fontWeight: active ? "bold" : "normal",
                      transition:"all .15s"}}>
                    {cat}
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{padding:"10px 16px 4px", fontSize:14, color:"#64748B"}}>{filtered.length}件表示中</div>

          {/* Grid */}
          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))", gap:16, padding:"8px 16px 32px"}}>
            {filtered.length === 0 ? (
              <div style={{gridColumn:"1/-1", textAlign:"center", padding:"60px 20px", color:"#94A3B8"}}>
                <div style={{fontSize:40, marginBottom:10}}>🔍</div>
                <div>条件に合う商品が見つかりませんでした</div>
              </div>
            ) : filtered.reduce((acc, p, i) => {
              const chain = chainMap[p.chainId];
              const prev  = filtered[i - 1];
              if (!prev || prev.chainId !== p.chainId) {
                acc.push(
                  <div key={`sep-${p.chainId}`} id={`chain-section-${p.chainId}`} style={{
                    gridColumn:"1/-1", display:"flex", alignItems:"center", gap:10,
                    paddingTop: i === 0 ? 0 : 8, scrollMarginTop: 120
                  }}>
                    <div style={{height:2, flex:1, background:chain.grad, borderRadius:1, opacity:.4}} />
                    <span style={{fontSize:15, fontWeight:"bold", color:chain.color, background:chain.bg,
                      padding:"4px 14px", borderRadius:20, border:`1.5px solid ${chain.color}30`, whiteSpace:"nowrap"}}>
                      {chain.emoji} {chain.name}
                    </span>
                    <div style={{height:2, flex:1, background:chain.grad, borderRadius:1, opacity:.4}} />
                  </div>
                );
              }
              acc.push(
                <a key={p.id} href={p.url} target="_blank" rel="noopener noreferrer">
                  <div className="card" style={{
                    background:"white", borderRadius:14, overflow:"hidden",
                    boxShadow:"0 2px 8px rgba(0,0,0,0.07)",
                    border:`1px solid ${chain.bg}`,
                    height:"100%", display:"flex", flexDirection:"column",
                    transition:"transform .15s, box-shadow .15s", cursor:"pointer"
                  }}>
                    <ProductImage img={p.img} chain={chain} name={p.name} />
                    <div style={{padding:"12px 14px", flex:1, display:"flex", flexDirection:"column"}}>
                      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7, flexWrap:"wrap", gap:4}}>
                        <span style={{fontSize:13, fontWeight:"bold", color:chain.color, background:chain.bg, padding:"2px 8px", borderRadius:10}}>
                          {chain.emoji} {chain.name}
                        </span>
                        <div style={{display:"flex", gap:4, alignItems:"center"}}>
                          {p.isNew && <span style={{fontSize:12, fontWeight:"bold", color:"white", background:"#E53E3E", padding:"2px 6px", borderRadius:8}}>NEW</span>}
                          <span style={{fontSize:13, color:"#718096", background:"#F7F8FA", padding:"2px 7px", borderRadius:10}}>
                            {CATEGORY_ICONS[p.category]||"🍽️"} {p.category}
                          </span>
                        </div>
                      </div>
                      <div style={{fontSize:16, fontWeight:"bold", color:"#1A202C", marginBottom:8, lineHeight:1.4, flex:1}}>{p.name}</div>
                      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", paddingTop:8, borderTop:"1px solid #F1F5F9"}}>
                        <span style={{fontSize:17, fontWeight:"bold", color:chain.color}}>{p.price}</span>
                        <div style={{display:"flex", flexDirection:"column", alignItems:"flex-end", gap:3}}>
                          <div style={{fontSize:12, color:"#94A3B8"}}>📅 {p.startDate === "〜" ? "販売中" : p.startDate}</div>
                          {p.note && <div style={{fontSize:12, color:"white", background:"#805AD5", padding:"2px 6px", borderRadius:6}}>{p.note}</div>}
                        </div>
                      </div>
                    </div>
                  </div>
                </a>
              );
              return acc;
            }, [])}
          </div>

          {/* Footer */}
          <div style={{background:"white", borderTop:"1px solid #EDF2F7", padding:"16px 16px 24px"}}>
            <div style={{fontSize:13, color:"#94A3B8", marginBottom:10, textAlign:"center"}}>📎 各チェーン 公式ページ</div>
            <div style={{display:"flex", flexWrap:"wrap", gap:8, justifyContent:"center"}}>
              {CHAINS.map(chain => (
                <a key={chain.id} href={chain.url} target="_blank" rel="noopener noreferrer"
                  style={{fontSize:13, color:chain.color, background:chain.bg, padding:"4px 10px", borderRadius:10, border:`1px solid ${chain.color}30`}}>
                  {chain.emoji} {chain.name}
                </a>
              ))}
            </div>
            <div style={{textAlign:"center", fontSize:12, color:"#CBD5E0", marginTop:10}}>
              各チェーン公式サイトより取得 • データ取得: 2026年6月7日
            </div>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
